<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Cisterna</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="tank-page">
    <header class="tank-header">
        <h1 id="tank-name"></h1>
        <div class="nav-buttons">
            <a href="/" class="back-button">Volver al Mapa</a>
            <button id="prev-grd" class="nav-button">Anterior</button>
            <button id="next-grd" class="nav-button">Siguiente</button>
        </div>
    </header>

    <main class="tank-main">
        <div id="tank-container-big" class="tank-container-big">
            <div id="water-level-big" class="water-level-big"></div>
            <div id="water-label-big" class="water-label-big"></div>
        </div>
        <div class="data-container-big">
            <div class="data-item">
                <p>Nivel de agua</p>
                <h2 id="nivel-metros-big">-- m</h2>
                <h3 id="nivel-porcentaje-big">--%</h3>
            </div>
            <div class="data-item">
                <p>Presión</p>
                <h2 id="presion-big">-- bar</h2>
            </div>
            <div class="data-item">
                <p>Bomba 1</p>
                <h2 id="bomba-1-big">--</h2>
            </div>
            <div class="data-item">
                <p>Bomba 2</p>
                <h2 id="bomba-2-big">--</h2>
            </div>
        </div>
    </main>

    <script src="/static/js/tank.js"></script>
</body>
</html>
